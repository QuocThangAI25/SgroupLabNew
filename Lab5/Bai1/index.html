<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css">
    <title>Transform</title>
  </head>
 
  <body>
    <div class="container">
      <div class="cl-content">
        <h3>
          <i
            class="fa-sharp fa-solid fa-apple-whole"
            style="color: rgb(255, 133, 0)"
          ></i>
          Transform - Hover vào từng ô
        </h3>
      </div>
      <div class="cl-transform">
        <span class="cl-translate">translate</span>
        <span class="cl-rotate">rotate</span>
        <span class="cl-scale">scale</span>
        <span class="cl-combine">combine</span>
      </div>
      <div class="cl-content-2">
        <h3>
          <i class="fa-brands fa-android"></i> overlay effect - hover vào card
        </h3>
      </div>
      <div class="cl-image">
        <span class="image-1">
          <img
            src="https://images.pexels.com/photos/34085113/pexels-photo-34085113.jpeg"
            alt=""
          />
          <div class="background"></div>
          <div class="content-image">Xem thêm</div>
        </span>
        <span class="image-2">
          <img
            src="https://images.pexels.com/photos/30899536/pexels-photo-30899536.jpeg"
            alt=""
          />
          <div class="background"></div>
          <div class="content-image">Xem thêm</div>
        </span>
        <span class="image-3">
          <img
            src="https://images.pexels.com/photos/31654670/pexels-photo-31654670.jpeg"
            alt=""
          />
          <div class="background"></div>
          <div class="content-image">Xem thêm</div>
        </span>
      </div>
      <div class="cl-content-3">
        <h3><i class="fa-brands fa-42-group"></i> @keyframes animation</h3>
      </div>
      <div class="cl-animation">
        <span class="cl-animation1">
          <div class="content-animation">bounce</div>
        </span>
        <span class="cl-animation2"
          ><div class="content-animation">spin</div></span
        >
        <span class="cl-animation3"
          ><div class="content-animation">pulse</div></span
        >
        <span class="cl-animation4"
          ><div class="content-animation">slideIn</div></span
        >
      </div>
      <div class="cl-content-3">
        <h3><i class="fa-brands fa-affiliatetheme"></i></i>css loaders (pure css)</h3>
      </div>
      <div class="animation-main">
        <span class="circle">
          
        </span>
        <span class="circle-mini">
          <span class="mini1">

          </span>
          <span class="mini2"></span>
<span class="mini3"></span>
        </span>
        <span class="animation-voice">
          <span class="voice1"></span><span class="voice2"></span><span class="voice3"></span><span class="voice4"></span><span class="voice5"></span>
        </span>
      </div>
    </div>
  </body>
</html>
