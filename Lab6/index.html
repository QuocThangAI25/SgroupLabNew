<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>Document</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        margin: 0;
        padding: 0;
      }
      .sidebar {
        width: 200px;
        background: #f5f5f7;
        border-right: 1px solid #ddd;
        padding: 16px;
        min-height: 100vh;
      }
      .nav-item {
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        color: #444;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .nav-item:hover {
        background: #e5e5e5;
      }
      .nav-item.active {
        background: #e0e8ff;
        color: #3355cc;
        font-weight: 500;
      }
      .content {
        padding: 32px;
      }
      .nav-item.has-sub::after {
        content: ">";
        margin-left: 50px;
        font-size: 12px;
        transition: all 0.15s ease;
        display: inline-block;
      }
      .nav-item.has-sub.open::after {
        transform: rotate(90deg);
      }
      .sub-menu {
        display: none;
      }
      .sub-menu.show {
        display: block;
      }
      .sub-item {
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        color: #444;
        margin-bottom: 4px;
      }
      .sub-item:hover {
        background: #e5e5e5;
      }
      .data-page.open::before {
        content: "📂";
        margin-right: 8px;
      }
    </style>
  </head>

  <body>
    <aside class="sidebar">
      <div class="nav-item active" data-page="tong-quan">🏠 Tổng quan</div>
      <div class="nav-item" data-page="bao-cao">📊 Báo cáo</div>
      <div class="nav-item has-sub" id="nav-users">👥 Người dùng</div>
      <div class="sub-menu" id="sub-users">
        <div class="sub-item" data-page="ds-users">Danh sách</div>
        <div class="sub-item" data-page="them-user">Thêm mới</div>
        <div class="sub-item" data-page="phan-quyen">Phân quyền</div>
      </div>

      <div class="nav-item has-sub" id="nav-settings">⚙️ Cài đặt</div>
      <div class="sub-menu" id="sub-settings">
        <div class="sub-item" data-page="ca-nhan">Cá nhân</div>
        <div class="sub-item" data-page="bao-mat">Bảo mật</div>
      </div>
    </aside>
    <main class="content">
      <h1>Trang tổng quan</h1>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas,
        voluptate.
      </p>
    </main>
  </body>
  <script>
    const nav_item1 = document.querySelectorAll(".nav-item");
    nav_item1.forEach((element) => {
      element.addEventListener("click", (e) => {
        nav_item1.forEach((l) => l.classList.remove("active"));
        element.classList.add("active");
      });
    });
    const nav_users = document.getElementById("nav-users");
    const sub_users = document.getElementById("sub-users");
    nav_users.addEventListener("click", () => {
      sub_users.classList.toggle("show");
      nav_users.classList.toggle("open");
    });
    const nav_settings = document.getElementById("nav-settings");
    const sub_settings = document.getElementById("sub-settings");
    nav_settings.addEventListener("click", () => {
      sub_settings.classList.toggle("show");
      nav_settings.classList.toggle("open");
    });
    const content = document.querySelector(".content");
    const sub_items = document.querySelectorAll(".sub-item");
    sub_items.forEach((element) => {
      element.addEventListener("click", () => {
        const page = element.getAttribute("data-page");
        content.innerHTML = `<h1>${page}</h1><p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>`;
      });
    });
    nav_item1.forEach((element) => {
      element.addEventListener("click", () => {
        const page = element.getAttribute("data-page");
        content.innerHTML = `<h1>Trang ${page}</h1><p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>`;
        element.classList.add("open");
      });
    });
    nav_users.addEventListener("click", () => {
      content.innerHTML = `<h1>Trang người dùng</h1><p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>`;
    });
    nav_settings.addEventListener("click", () => {
      content.innerHTML = `<h1>Trang cài đặt</h1><p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>`;
    });
  </script>
</html>
